<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AlphaDesk</title>
  <script>
    // SPA fallback: Render serves this file when a path like /markets isn't found.
    // Store the intended path and redirect to root so React Router can handle it.
    var path = window.location.pathname;
    if (path && path !== '/') {
      sessionStorage.setItem('__spa_path', path);
    }
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
